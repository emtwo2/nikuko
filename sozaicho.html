<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="惣菜帳">
<meta name="mobile-web-app-capable" content="yes">
<title>惣菜帳 - 惣菜在庫管理</title>
<style>
  :root{
    --paper:#EFEDE7; --paper2:#E6E2D8; --card:#FBFAF7;
    --ink:#211F1C; --ink-soft:#6b665c; --line:#CBC6BA;
    --stamp:#B5651D; --stamp-soft:#F3E6D8; --stamp-deep:#7C4514;
    --alert:#AA3A2E; --alert-soft:#F6E1DD;
    --good:#3F6B4A; --good-soft:#E4EEE6;
    --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; overflow-x:hidden; width:100%;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; padding-bottom:env(safe-area-inset-bottom);
    overscroll-behavior:none;
  }
  .num{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; font-variant-numeric:tabular-nums;}

  header.app{
    padding:calc(env(safe-area-inset-top) + 14px) 20px 14px;
    background:var(--paper); border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:10;
    display:flex; align-items:baseline; justify-content:space-between;
  }
  header.app .brand{display:flex; align-items:baseline; gap:10px;}
  header.app h1{ font-size:22px; margin:0; font-weight:800; letter-spacing:.02em; }
  header.app .stamp-mark{
    display:inline-flex; align-items:center; justify-content:center;
    width:22px; height:22px; border-radius:50%;
    border:1.6px solid var(--stamp); color:var(--stamp);
    font-size:11px; font-weight:800; transform:rotate(-8deg);
  }
  header.app .sub{font-size:11px; color:var(--ink-soft);}
  #offlineBadge{
    font-size:10.5px; padding:3px 9px; border-radius:20px; font-weight:700;
    border:1px solid var(--line); color:var(--ink-soft); background:var(--card);
  }
  #offlineBadge.off{ color:var(--alert); border-color:var(--alert); background:var(--alert-soft); }
  #offlineBadge.on{ color:var(--good); border-color:var(--good); background:var(--good-soft); }

  main{ padding:16px 16px 100px; max-width:640px; margin:0 auto; }
  .screen{ display:none; animation:fade .18s ease; }
  .screen.active{ display:block; }
  @keyframes fade{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;} }

  .section-title{
    font-size:12px; font-weight:800; letter-spacing:.12em; color:var(--stamp);
    text-transform:uppercase; margin:22px 0 10px;
  }
  .section-title:first-child{ margin-top:2px; }

  .card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; margin-bottom:12px;
  }

  label.field{ display:block; margin-bottom:14px; }
  label.field .lbl{ display:block; font-size:12.5px; color:var(--ink-soft); margin-bottom:6px; font-weight:600; }
  select,input[type=text],input[type=number],input[type=date],textarea{
    width:100%; font-size:17px; padding:12px 12px; border-radius:10px;
    border:1.4px solid var(--line); background:#fff; color:var(--ink); font-family:inherit;
  }
  input[type=date]{ -webkit-appearance:none; appearance:none; max-width:100%; min-width:0; }
  select:focus,input:focus,textarea:focus{ outline:2.5px solid var(--stamp); outline-offset:1px; border-color:var(--stamp); }
  input[type=number]{ font-family:ui-monospace,"SF Mono",monospace; font-weight:700; }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }

  .chipwrap{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{
    padding:11px 16px; border-radius:20px; border:1.6px solid var(--line);
    background:#fff; font-size:15px; font-weight:600; color:var(--ink);
  }
  .chip.selected{ background:var(--stamp); border-color:var(--stamp); color:#fff; }

  .btn{
    width:100%; padding:15px; border-radius:12px; border:none; font-size:16.5px;
    font-weight:800; letter-spacing:.02em; color:#fff; background:var(--stamp);
  }
  .btn:active{ background:var(--stamp-deep); }
  .btn.ghost{ background:transparent; color:var(--stamp); border:1.6px solid var(--stamp); font-weight:700; }
  .btn.alert{ background:var(--alert); }
  .btn.alert.ghost{ background:transparent; color:var(--alert); border-color:var(--alert); }
  .btn.small{ width:auto; padding:9px 14px; font-size:13.5px; border-radius:9px; }
  .btn:disabled{ background:var(--line); color:#8a8578; }

  .stocklist{ display:flex; flex-direction:column; gap:10px; }
  .stockrow{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px 16px; display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .stockrow.low{ border-color:var(--alert); background:var(--alert-soft); }
  .stockrow .name{ font-weight:800; font-size:16px; }
  .stockrow .meta{ font-size:12px; color:var(--ink-soft); margin-top:3px; }
  .stockrow .qty{ text-align:right; }
  .stockrow .qty .n{ font-size:19px; font-weight:800; }
  .stockrow .qty .u{ font-size:12px; color:var(--ink-soft); }
  .taglow{
    display:inline-block; font-size:10.5px; font-weight:800; color:var(--alert);
    border:1px solid var(--alert); border-radius:20px; padding:2px 8px; margin-top:4px;
  }

  .summarybar{
    display:flex; justify-content:space-between; align-items:center;
    background:var(--stamp-soft); border:1px solid var(--stamp); border-radius:var(--radius);
    padding:14px 16px; margin-bottom:14px;
  }
  .summarybar .v{ font-size:22px; font-weight:800; color:var(--stamp-deep); }
  .summarybar .l{ font-size:11.5px; color:var(--stamp-deep); font-weight:700; }

  .logitem{ display:flex; gap:12px; padding:12px 4px; border-bottom:1px solid var(--line); }
  .logitem:last-child{ border-bottom:none; }
  .stampbadge{
    flex:none; width:44px; height:44px; border-radius:50%;
    border:1.8px solid var(--stamp); color:var(--stamp);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-size:9.5px; font-weight:800; transform:rotate(-6deg); line-height:1.1;
    background:var(--stamp-soft);
  }
  .logitem.out .stampbadge{ border-color:var(--alert); color:var(--alert); background:var(--alert-soft); transform:rotate(5deg); }
  .logitem .body{ flex:1; min-width:0; }
  .logitem .t1{ font-weight:700; font-size:15px; }
  .logitem .t2{ font-size:12.5px; color:var(--ink-soft); margin-top:2px; }
  .logitem .t3{ font-size:14px; font-weight:800; margin-top:4px; }
  .logitem.out .t3{ color:var(--alert); }
  .logitem.in .t3{ color:var(--good); }
  .logitem .del{ flex:none; background:none; border:none; color:var(--ink-soft); font-size:12px; padding:6px; }

  .itemrow{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:8px;
  }
  .itemrow .im{ font-size:11.5px; color:var(--ink-soft); }
  .itemrow button{ background:none; border:none; color:var(--stamp); font-size:13px; font-weight:700; padding:6px 8px; }
  .itemrow button.del{ color:var(--alert); }

  .empty{ text-align:center; color:var(--ink-soft); font-size:13.5px; padding:30px 10px; }

  nav.tabbar{
    position:fixed; bottom:0; left:0; right:0; z-index:20;
    background:var(--card); border-top:1px solid var(--line);
    padding:8px 6px calc(env(safe-area-inset-bottom) + 6px);
    display:flex; justify-content:space-around;
  }
  nav.tabbar button{
    background:none; border:none; flex:1; padding:6px 2px; position:relative;
    font-size:12px; font-weight:700; color:var(--ink-soft);
    display:flex; flex-direction:column; align-items:center; gap:4px;
  }
  nav.tabbar button .dot{ width:6px; height:6px; border-radius:50%; background:transparent; }
  nav.tabbar button.active{ color:var(--stamp); }
  nav.tabbar button.active .dot{ background:var(--stamp); }
  nav.tabbar button .badge{
    position:absolute; margin-left:14px; margin-top:-4px;
    background:var(--alert); color:#fff; font-size:9px; font-weight:800;
    border-radius:20px; padding:1px 5px; min-width:14px; text-align:center;
  }

  .toast{
    position:fixed; left:50%; bottom:90px; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#fff; padding:12px 20px; border-radius:30px;
    font-size:14px; font-weight:600; opacity:0; pointer-events:none; z-index:50;
    transition:all .25s ease; max-width:85%; text-align:center;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  textarea.exportbox{
    width:100%; height:180px; font-family:ui-monospace,"SF Mono",monospace; font-size:11.5px;
    background:#fff; border:1.4px solid var(--line); border-radius:10px; padding:10px; resize:vertical;
  }
  .hint{ font-size:12.5px; color:var(--ink-soft); line-height:1.6; }
  .divider{ height:1px; background:var(--line); margin:18px 0; }

</style>
</head>
<body>

<header class="app">
  <div class="brand">
    <span class="stamp-mark">惣</span>
    <div>
      <h1>惣菜帳</h1>
      <div class="sub">惣菜 在庫台帳 ・ <span id="appVersion" class="num"></span></div>
    </div>
  </div>
  <span id="offlineBadge">-</span>
</header>

<main>

  <!-- 入荷 -->
  <section class="screen" id="screen-in">
    <div class="section-title">入荷を記録</div>
    <div class="card">
      <label class="field">
        <span class="lbl">品目</span>
        <select id="inItemSelect" onchange="onInItemChange()"></select>
      </label>
      <label class="field">
        <span class="lbl">数量 <span id="inUnitLabel"></span></span>
        <input type="number" inputmode="decimal" id="inQty" placeholder="0">
      </label>
      <p class="hint" id="inPriceDisplay" style="margin:-6px 0 14px;"></p>
      <label class="field">
        <span class="lbl">日付</span>
        <input type="date" id="inDate">
      </label>
      <button class="btn" onclick="submitIn()">入荷を記録する</button>
    </div>
  </section>

  <!-- 出荷 -->
  <section class="screen" id="screen-out">
    <div class="section-title">出荷・使用を記録</div>
    <div class="card">
      <label class="field">
        <span class="lbl">品目</span>
        <select id="outItemSelect" onchange="onOutItemChange()"></select>
      </label>
      <label class="field">
        <span class="lbl">数量 <span id="outUnitLabel"></span>　（現在庫: <span id="outCurrentQty" class="num">-</span>）</span>
        <input type="number" inputmode="decimal" id="outQty" placeholder="0">
      </label>
      <label class="field">
        <span class="lbl">日付</span>
        <input type="date" id="outDate">
      </label>
      <button class="btn alert" onclick="submitOut()">出荷・使用を記録する</button>
    </div>
  </section>

  <!-- 在庫 -->
  <section class="screen" id="screen-stock">
    <div class="section-title">現在庫</div>
    <div class="summarybar">
      <div><div class="v num" id="totalValue">¥0</div><div class="l">在庫評価額合計</div></div>
      <div style="text-align:right"><div class="v num" id="lowCount">0</div><div class="l">アラート品目</div></div>
    </div>
    <div class="stocklist" id="stockList"></div>
  </section>

  <!-- 履歴 -->
  <section class="screen" id="screen-history">
    <div class="section-title">記録履歴</div>
    <div class="card" style="padding:6px 14px;">
      <div id="historyList"></div>
    </div>
  </section>

  <!-- 設定 -->
  <section class="screen" id="screen-settings">
    <div class="section-title">この端末の使用者</div>
    <div class="card">
      <label class="field">
        <span class="lbl">使用者名</span>
        <input type="text" id="staffName" placeholder="例）田中">
      </label>
    </div>

    <div class="section-title">品目マスタ</div>
    <div class="card">
      <div id="itemMasterList"></div>
      <div class="divider"></div>
      <label class="field">
        <span class="lbl">品目名</span>
        <input type="text" id="newItemName" placeholder="例）コロッケ">
      </label>
      <div class="row2">
        <label class="field">
          <span class="lbl">単位</span>
          <select id="newItemUnit">
            <option value="個">個</option>
            <option value="パック">パック</option>
            <option value="kg">kg</option>
          </select>
        </label>
        <label class="field">
          <span class="lbl">アラート閾値</span>
          <input type="number" inputmode="decimal" id="newItemThreshold" placeholder="例）10">
        </label>
      </div>
      <label class="field">
        <span class="lbl">単価（円）</span>
        <input type="number" inputmode="decimal" id="newItemPrice" placeholder="例）150">
      </label>
      <button class="btn ghost" onclick="addItem()">品目を追加</button>
    </div>

    <div class="section-title">データ管理</div>
    <div class="card">
      <button class="btn alert" onclick="resetAll()">全データを削除する</button>
    </div>

    <div class="section-title">バージョン情報</div>
    <div class="card">
      <p class="hint"><span class="num" id="appVersionFull" style="font-weight:800; font-size:15px; color:var(--ink);"></span></p>
      <p class="hint" style="margin-top:6px;" id="appVersionNote"></p>
    </div>
  </section>

</main>

<nav class="tabbar">
  <button data-screen="screen-in"><span class="dot"></span>入荷</button>
  <button data-screen="screen-out"><span class="dot"></span>出荷</button>
  <button data-screen="screen-stock" style="position:relative;"><span class="dot"></span>在庫<span class="badge" id="tabBadge" style="display:none;"></span></button>
  <button data-screen="screen-history"><span class="dot"></span>履歴</button>
  <button data-screen="screen-settings"><span class="dot"></span>設定</button>
</nav>

<div class="toast" id="toast"></div>

<script>
/* ---------- バージョン情報 ---------- */
const APP_VERSION = 'v8';
const APP_VERSION_DATE = '2026-07-10';
const APP_VERSION_NOTE = '記入用シートで品目名が長いと省略される不具合を修正。名前を折り返し表示にし、1列あたりの行数を調整。';
document.getElementById('appVersion').textContent = APP_VERSION;
document.getElementById('appVersionFull').textContent = `${APP_VERSION}（${APP_VERSION_DATE}）`;
document.getElementById('appVersionNote').textContent = APP_VERSION_NOTE;

/* ---------- データ層 (localStorage) ---------- */
const LS_ITEMS='sozaicho_items', LS_LOGS='sozaicho_logs', LS_STAFFNAME='sozaicho_staffname';

function loadItems(){ return JSON.parse(localStorage.getItem(LS_ITEMS) || 'null') || defaultItems(); }
function saveItems(v){ localStorage.setItem(LS_ITEMS, JSON.stringify(v)); }
function loadLogs(){ return JSON.parse(localStorage.getItem(LS_LOGS) || '[]'); }
function saveLogs(v){ localStorage.setItem(LS_LOGS, JSON.stringify(v)); }
function loadStaffName(){ return localStorage.getItem(LS_STAFFNAME) || ''; }
function saveStaffName(v){ localStorage.setItem(LS_STAFFNAME, v); }

function defaultItems(){
  return [
    {id: uid(), name:'コロッケ', unit:'個', threshold:20, price:150},
    {id: uid(), name:'から揚げ', unit:'パック', threshold:10, price:450},
  ];
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

let items = loadItems();
let logs = loadLogs();
if(!localStorage.getItem(LS_ITEMS)) saveItems(items);

let selectedInItem = null;
let selectedOutItem = null;
let selectedOutReason = '出荷'; /* 理由選択は廃止し固定値にした */

/* ---------- 在庫計算 ---------- */
function stockFor(itemId){
  let qty=0, totalCost=0, totalCostQty=0;
  const rel = logs.filter(l=>l.itemId===itemId).sort((a,b)=> (a.date+a.ts) < (b.date+b.ts) ? -1:1);
  for(const l of rel){
    if(l.type==='in'){
      qty += l.qty;
      totalCost += l.qty*(l.price||0);
      totalCostQty += l.qty;
    } else {
      qty -= l.qty;
    }
  }
  const avgCost = totalCostQty>0 ? totalCost/totalCostQty : 0;
  return { qty: Math.round(qty*1000)/1000, avgCost, value: Math.round(qty*avgCost) };
}

/* ---------- 画面切替 ---------- */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('nav.tabbar button').forEach(b=>b.classList.toggle('active', b.dataset.screen===id));
  if(id==='screen-stock') renderStock();
  if(id==='screen-history') renderHistory();
  if(id==='screen-settings') renderSettings();
  if(id==='screen-in') renderInItemSelect();
  if(id==='screen-out') renderOutItemSelect();
}
document.querySelectorAll('nav.tabbar button').forEach(b=>{
  b.addEventListener('click', ()=> showScreen(b.dataset.screen));
});

let toastTimer=null;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'), 1800);
}

/* ---------- 入荷タブ ---------- */
function renderInItemSelect(){
  const sel=document.getElementById('inItemSelect');
  if(items.length===0){ sel.innerHTML='<option value="">先に「設定」から品目を登録してな</option>'; return; }
  if(!items.find(i=>i.id===selectedInItem)) selectedInItem=items[0].id;
  sel.innerHTML = items.map(it=>`<option value="${it.id}"${it.id===selectedInItem?' selected':''}>${esc(it.name)}</option>`).join('');
  sel.value = selectedInItem;
  updateInUnitLabels();
}
function onInItemChange(){
  selectedInItem = document.getElementById('inItemSelect').value;
  updateInUnitLabels();
}
function updateInUnitLabels(){
  const cur = items.find(i=>i.id===selectedInItem);
  document.getElementById('inUnitLabel').textContent = cur ? `(${cur.unit})` : '';
  document.getElementById('inPriceDisplay').textContent = cur
    ? `単価：¥${(cur.price||0).toLocaleString()}/${cur.unit}（品目マスタの設定を使うで。変更は設定タブから）`
    : '';
}
document.getElementById('inDate').value = todayStr();

function submitIn(){
  if(!selectedInItem){ toast('品目を選んでな'); return; }
  const qty=parseFloat(document.getElementById('inQty').value);
  if(!qty || qty<=0){ toast('数量を入力してな'); return; }
  const curItem = items.find(i=>i.id===selectedInItem);
  const price = curItem?.price || 0;
  const date=document.getElementById('inDate').value || todayStr();
  logs.push({id:uid(), type:'in', itemId:selectedInItem, qty, price, date, ts:Date.now(), synced:false});
  saveLogs(logs);
  document.getElementById('inQty').value='';
  const nm = curItem?.name || '';
  const unit = curItem?.unit || '';
  toast(`${nm} ${qty}${unit} を入荷記録したで`);
  refreshBadges();
}

/* ---------- 出荷タブ ---------- */
function renderOutItemSelect(){
  const sel=document.getElementById('outItemSelect');
  if(items.length===0){ sel.innerHTML='<option value="">先に「設定」から品目を登録してな</option>'; document.getElementById('outCurrentQty').textContent='-'; return; }
  if(!items.find(i=>i.id===selectedOutItem)) selectedOutItem=items[0].id;
  sel.innerHTML = items.map(it=>`<option value="${it.id}"${it.id===selectedOutItem?' selected':''}>${esc(it.name)}</option>`).join('');
  sel.value = selectedOutItem;
  updateOutInfo();
}
function onOutItemChange(){
  selectedOutItem = document.getElementById('outItemSelect').value;
  updateOutInfo();
}
function updateOutInfo(){
  const cur = items.find(i=>i.id===selectedOutItem);
  document.getElementById('outUnitLabel').textContent = cur ? `(${cur.unit})` : '';
  const st = cur ? stockFor(cur.id) : {qty:0};
  document.getElementById('outCurrentQty').textContent = cur ? `${st.qty} ${cur.unit}` : '-';
}
document.getElementById('outDate').value = todayStr();

function submitOut(){
  if(!selectedOutItem){ toast('品目を選んでな'); return; }
  const qty=parseFloat(document.getElementById('outQty').value);
  const date=document.getElementById('outDate').value || todayStr();
  if(!qty || qty<=0){ toast('数量を入力してな'); return; }
  logs.push({id:uid(), type:'out', itemId:selectedOutItem, qty, reason:selectedOutReason, date, ts:Date.now(), synced:false});
  saveLogs(logs);
  document.getElementById('outQty').value='';
  const nm = items.find(i=>i.id===selectedOutItem)?.name || '';
  const unit = items.find(i=>i.id===selectedOutItem)?.unit || '';
  toast(`${nm} ${qty}${unit} を記録したで`);
  renderOutItemSelect();
  refreshBadges();
}

/* ---------- 在庫一覧タブ ---------- */
function renderStock(){
  const list=document.getElementById('stockList'); list.innerHTML='';
  let totalValue=0, lowCount=0;
  if(items.length===0){ list.innerHTML='<div class="empty">品目が登録されてへんで。「設定」から追加してな</div>'; }
  items.forEach(it=>{
    const st=stockFor(it.id);
    totalValue+=st.value;
    const low = st.qty <= (it.threshold||0);
    if(low) lowCount++;
    const row=document.createElement('div');
    row.className='stockrow'+(low?' low':'');
    row.innerHTML=`
      <div>
        <div class="name">${esc(it.name)}</div>
        <div class="meta">平均単価 ¥${Math.round(st.avgCost).toLocaleString()}/${it.unit} ・ 評価額 ¥${st.value.toLocaleString()}</div>
        ${low?'<span class="taglow">在庫少</span>':''}
      </div>
      <div class="qty">
        <div class="n num">${st.qty}</div>
        <div class="u">${it.unit}</div>
      </div>`;
    list.appendChild(row);
  });
  document.getElementById('totalValue').textContent = '¥'+totalValue.toLocaleString();
  document.getElementById('lowCount').textContent = lowCount;
  refreshBadges(lowCount);
}

function refreshBadges(lowCountKnown){
  const lowCount = lowCountKnown!==undefined ? lowCountKnown : items.filter(it=>stockFor(it.id).qty<=(it.threshold||0)).length;
  const badge=document.getElementById('tabBadge');
  if(lowCount>0){ badge.style.display='inline-block'; badge.textContent=lowCount; }
  else { badge.style.display='none'; }
}

/* ---------- 履歴タブ ---------- */
function renderHistory(){
  const wrap=document.getElementById('historyList');
  const sorted=[...logs].sort((a,b)=>b.ts-a.ts);
  if(sorted.length===0){ wrap.innerHTML='<div class="empty">まだ記録がないで</div>'; return; }
  wrap.innerHTML='';
  sorted.forEach(l=>{
    const it=items.find(i=>i.id===l.itemId);
    const nm = it?it.name:'（削除済み品目）';
    const unit = it?it.unit:'';
    const div=document.createElement('div');
    div.className='logitem '+l.type;
    const dd = l.date;
    const stampTop = l.type==='in' ? '入' : '出';
    div.innerHTML=`
      <div class="stampbadge">${stampTop}<span class="num" style="font-size:8px;">${dd.slice(5).replace('-','/')}</span></div>
      <div class="body">
        <div class="t1">${esc(nm)}</div>
        <div class="t2">${l.type==='in' ? '¥'+ (l.price||0).toLocaleString() +'/'+unit : esc(l.reason||'')}${l.synced?' ・ 同期済み':''}</div>
        <div class="t3 num">${l.type==='in'?'+':'-'}${l.qty} ${unit}</div>
      </div>
      <button class="del" onclick="deleteLog('${l.id}')">削除</button>`;
    wrap.appendChild(div);
  });
}
function deleteLog(id){
  if(!confirm('この記録を削除する？')) return;
  logs = logs.filter(l=>l.id!==id);
  saveLogs(logs);
  renderHistory();
  refreshBadges();
}

/* ---------- 設定タブ ---------- */
function renderSettings(){
  document.getElementById('staffName').value = loadStaffName();
  const wrap=document.getElementById('itemMasterList'); wrap.innerHTML='';
  if(items.length===0){ wrap.innerHTML='<div class="empty">品目がまだないで</div>'; }
  items.forEach(it=>{
    const row=document.createElement('div'); row.className='itemrow'; row.style.flexWrap='wrap';
    row.innerHTML=`
      <div style="flex:1; min-width:140px;">
        <div style="font-weight:700;">${esc(it.name)}</div>
        <div class="im">単位: ${it.unit} ・ アラート閾値: ${it.threshold}${it.unit}</div>
      </div>
      <div style="display:flex; align-items:center; gap:6px;">
        <span class="im">単価¥</span>
        <input type="number" inputmode="decimal" value="${it.price||0}" style="width:80px; padding:6px 8px; font-size:14px;" onchange="updateItemPrice('${it.id}', this.value)">
      </div>
      <button class="del" onclick="deleteItem('${it.id}')">削除</button>`;
    wrap.appendChild(row);
  });
  refreshBadges();
}
function updateItemPrice(id, val){
  const p = parseFloat(val)||0;
  const it = items.find(i=>i.id===id);
  if(!it) return;
  it.price = p;
  saveItems(items);
  toast(`「${it.name}」の単価を¥${p.toLocaleString()}に更新したで`);
}
document.getElementById('staffName').addEventListener('input', e=>{ saveStaffName(e.target.value); });
function addItem(){
  const name=document.getElementById('newItemName').value.trim();
  const unit=document.getElementById('newItemUnit').value;
  const threshold=parseFloat(document.getElementById('newItemThreshold').value)||0;
  const price=parseFloat(document.getElementById('newItemPrice').value)||0;
  if(!name){ toast('品目名を入力してな'); return; }
  items.push({id:uid(), name, unit, threshold, price});
  saveItems(items);
  document.getElementById('newItemName').value='';
  document.getElementById('newItemThreshold').value='';
  document.getElementById('newItemPrice').value='';
  toast(`「${name}」を登録したで`);
  renderSettings();
}
function deleteItem(id){
  const hasLogs = logs.some(l=>l.itemId===id);
  const msg = hasLogs ? 'この品目には記録履歴があるで。削除すると一覧上は「削除済み品目」と表示されるようになるけど、履歴は残る。削除する？' : 'この品目を削除する？';
  if(!confirm(msg)) return;
  items = items.filter(i=>i.id!==id);
  saveItems(items);
  renderSettings();
}

function resetAll(){
  if(!confirm('本当に全データを削除する？元に戻せへんで。')) return;
  if(!confirm('もう一度確認：品目・入荷・出荷のすべての記録が消えるで。ええか？')) return;
  localStorage.removeItem(LS_ITEMS);
  localStorage.removeItem(LS_LOGS);
  items = defaultItems(); saveItems(items);
  logs = []; saveLogs(logs);
  toast('全データを削除したで');
  renderSettings(); renderStock(); renderHistory();
}

/* ---------- オンライン表示 ---------- */
function updateOnlineBadge(){
  const b=document.getElementById('offlineBadge');
  if(navigator.onLine){ b.textContent='オンライン'; b.className='on'; }
  else { b.textContent='オフライン（データは端末内に保存中）'; b.className='off'; }
}
window.addEventListener('online', updateOnlineBadge);
window.addEventListener('offline', updateOnlineBadge);
updateOnlineBadge();

/* 初期表示 */
showScreen('screen-in');
refreshBadges();
</script>
</body>
</html>
